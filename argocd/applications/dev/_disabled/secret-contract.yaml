apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mock-trading-platform-dev-secret-contract
  namespace: argocd
  annotations:
    # external-secrets operator/CRD 동기화 이후 contract 적용
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: mock-trading-platform-dev

  source:
    repoURL: https://github.com/banhae/mock-trading-platform-gitops.git
    targetRevision: main
    path: argocd/manifests/dev/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: mock-trading-platform-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
