apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mock-trading-platform-dev-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: mock-trading-platform-dev

  sources:
    # Helm chart from exchange-app repo
    - repoURL: https://github.com/banhae/mock-trading-platform-app.git
      targetRevision: main
      path: charts/frontend
      helm:
        valueFiles:
          - $values/environments/dev/values/frontend.yaml

    # Values source (this repo)
    - repoURL: https://github.com/banhae/mock-trading-platform-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: mock-trading-platform-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
