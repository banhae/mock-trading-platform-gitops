apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mock-trading-platform-dev-external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: mock-trading-platform-dev

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.20.4"
    helm:
      values: |
        # chart 권장값: CRD를 함께 설치해 operator + CRD 순서를 단순화
        installCRDs: true
        replicaCount: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Helm이 커다란 CRD를 번들로 딥어 client-side apply를 쓰면
      # kubectl.kubernetes.io/last-applied-configuration annotation이
      # 262144 bytes를 초과해 sync 실패. SSA로 전환하면 annotation
      # 미사용이라 해결됨.
      - ServerSideApply=true
