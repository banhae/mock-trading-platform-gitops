# wallet-service dev environment values
# Chart source: mock-trading-platform-app/charts/wallet-service
#
# Secret contract (app-nats):
# - NATS_URL
# - NATS_TOKEN

image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/mock-trading-platform/wallet-service
  tag: "sha-a03d8a6"
  pullPolicy: IfNotPresent

fullnameOverride: wallet-service

service:
  type: ClusterIP

env:
  # dev 전용 리터럴. ExternalSecrets 연동 후 secretRef로 전환 예정
  EVENT_BUS_ENABLED: "true"
  NATS_URL: "nats://mock-trading-platform-dev-nats:4222"
