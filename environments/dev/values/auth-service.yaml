# auth-service dev environment values
# Chart source: mock-trading-platform-app/charts/auth-service
#
# Secret contract:
# - auth-jwt/JWT_SECRET는 ExternalSecret으로 생성된 Kubernetes Secret에서 공급

image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/mock-trading-platform/auth-service
  tag: "sha-a03d8a6"
  pullPolicy: IfNotPresent

fullnameOverride: auth-service

service:
  type: ClusterIP

env:
  # dev 전용 리터럴. ExternalSecrets 연동 후 secretRef로 전환 예정
  JWT_SECRET: "dev-jwt-secret-change-me"
